services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/habits.db
      LOGS_DIR: /logs
    volumes:
      - ./data:/data
      - ./logs:/logs

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8092:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./assets:/usr/share/nginx/html/assets:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./assets:/app/assets:ro
    depends_on:
      - frontend
